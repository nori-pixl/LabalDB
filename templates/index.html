<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LabelDB - プラットフォームコンソール</title>
    <style>
        /* 外部CSS不要：あらゆる環境で100%確実に適用されるRender風ダークモードコアスタイル */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: #0A0A0C; color: #E2E8F0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Hiragino Kaku Gothic ProN", sans-serif;
            font-size: 13px; line-height: 1.5; padding-bottom: 80px;
        }
        .mono { font-family: monospace; }
        
        /* ナビゲーションヘッダー */
        .header {
            width: 100%; background: #111115; border-bottom: 1px solid #22222A;
            padding: 12px 24px; display: flex; justify-content: space-between; align-items: center;
        }
        .logo-area { display: flex; align-items: center; gap: 10px; }
        .logo-icon {
            width: 24px; height: 24px; background-color: #4F46E5; border-radius: 4px;
            display: flex; align-items: center; justify-content: center; font-weight: bold; color: white; font-size: 12px;
        }
        .logo-text { font-family: monospace; font-size: 15px; font-weight: 600; color: white; }
        
        /* ページメインコンテナ */
        .container { max-width: 1100px; margin: 0 auto; padding: 32px 24px; }
        .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
        .page-title { font-size: 18px; font-weight: 600; color: white; font-family: monospace; }
        
        /* 各種アクションボタン */
        .btn-create {
            background-color: #4F46E5; color: white; border: none; padding: 8px 16px;
            border-radius: 6px; font-weight: 600; cursor: pointer; transition: background 0.15s; font-family: monospace;
        }
        .btn-create:hover { background-color: #4338CA; }
        .btn-secondary {
            background-color: transparent; border: 1px solid #2D2D3D; color: #94A3B8;
            padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 12px; font-family: monospace;
        }
        .btn-secondary:hover { border-color: #475569; color: white; }
        
        /* スクリプト風ブロック定義パーツ */
        .block-palette-btn {
            padding: 8px 12px; border-radius: 6px; color: white; text-align: left;
            cursor: pointer; display: flex; align-items: center; gap: 8px; font-size: 12px; font-weight: 600; transition: opacity 0.15s;
        }
        .block-palette-btn:hover { opacity: 0.9; }
        .type-indicator {
            width: 22px; height: 22px; border-radius: 4px; font-size: 11px;
            display: flex; align-items: center; justify-content: center; font-weight: bold; font-family: monospace;
        }
        .bg-str { background-color: #1E1B4B; color: #818CF8; border: 1px solid #312E81; }
        .bg-num { background-color: #064E3B; color: #34D399; border: 1px solid #065F46; }

        /* データベースカードボード */
        .db-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 16px; }
        .db-card {
            background-color: #111116; border: 1px solid #22222B; border-radius: 8px; padding: 16px;
            display: flex; flex-direction: column; gap: 12px; transition: border-color 0.15s; cursor: pointer;
        }
        .db-card:hover { border-color: #4F46E5; }
        .card-top { display: flex; justify-content: space-between; align-items: center; }
        .db-name { font-size: 14px; font-weight: 600; color: white; font-family: monospace; }
        
        /* 状態インジケータ */
        .status-badge { display: flex; align-items: center; gap: 6px; font-size: 11px; font-family: monospace; font-weight: 600; }
        .dot { width: 6px; height: 6px; border-radius: 50%; display: inline-block; }
        .status-online { color: #10B981; }
        .status-online .dot { background-color: #10B981; box-shadow: 0 0 6px #10B981; }
        .status-offline { color: #64748B; }
        .status-offline .dot { background-color: #475569; }
        
        /* ネットワーク種別タグ */
        .net-tag { font-size: 10px; font-family: monospace; padding: 2px 6px; border-radius: 4px; font-weight: bold; }
        .net-local { background-color: #1C1917; color: #A8A29E; border: 1px solid #44403C; }
        .net-shared { background-color: #1E1B4B; color: #818CF8; border: 1px solid #312E81; }
        .net-external { background-color: #2E1B4E; color: #C084FC; border: 1px solid #4C1D95; }
        
        .db-meta { font-size: 11px; color: #64748B; font-family: monospace; border-top: 1px solid #1F1F27; padding-top: 8px; display: flex; justify-content: space-between; align-items: center; }
    </style>
</head>
<body>

    <!-- グローバルヘッダー -->
    <header class="header">
        <div class="logo-area">
            <div class="logo-icon">L</div>
            <span class="logo-text">LabelDB Platform</span>
        </div>
        <div id="usage-counter" class="mono" style="font-size: 11px; color: #64748B;">使用枠: 10個中 0個</div>
    </header>

    <div class="container">
        <!-- ページメインヘッダー -->
        <div class="page-header">
            <h1 class="page-title">インフラダッシュボード</h1>
            <button class="btn-create" onclick="openCreateModal()">
                ＋ データベースを作る
            </button>
        </div>

        <!-- 物理的にデータがマッピングされてマウントされるコンテナエリア -->
        <div id="real-db-grid" class="db-grid">
            <!-- JavaScriptのロード処理によって自動でここにカードが生成されます -->
        </div>
    </div>
        <!-- ========================================== -->
    <!-- ウインドウ1: データベースを新規作成・埋め込みする画面 -->
    <!-- ========================================== -->
    <div id="db-create-modal" style="
        display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background-color: rgba(0, 0, 0, 0.7); backdrop-filter: blur(4px);
        justify-content: center; align-items: center; z-index: 1000; padding: 20px;
    ">
        <div style="
            background-color: #111116; border: 1px solid #2D2D3D; border-radius: 12px;
            width: 100%; max-width: 520px; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5);
            display: flex; flex-direction: column; overflow: hidden;
        ">
            <!-- ウィンドウヘッダー -->
            <div style="
                padding: 16px 20px; border-bottom: 1px solid #22222B; background-color: #161620;
                display: flex; justify-content: space-between; align-items: center;
            ">
                <span class="mono" style="font-size: 13px; font-weight: 600; color: white;">新しいデータベースを構築</span>
                <button onclick="closeCreateModal()" style="background: none; border: none; color: #64748B; font-size: 16px; cursor: pointer;">✕</button>
            </div>

            <!-- ウィンドウコンテンツ本体 -->
            <div style="padding: 20px; display: flex; flex-direction: column; gap: 16px; max-height: 75vh; overflow-y: auto;">
                
                <!-- データベース名入力 -->
                <div style="display: flex; flex-direction: column; gap: 6px;">
                    <label class="mono" style="font-size: 11px; font-weight: 600; color: #94A3B8;">データベース名</label>
                    <input type="text" id="input-db-name" placeholder="例: user_label_catalog" class="mono" style="
                        background-color: #0A0A0E; border: 1px solid #22222B; border-radius: 6px;
                        padding: 8px 12px; color: white; font-size: 12px; width: 100%; outline: none;
                    ">
                </div>

                <!-- 方式切り替え環境選択 -->
                <div style="display: flex; flex-direction: column; gap: 6px;">
                    <label class="mono" style="font-size: 11px; font-weight: 600; color: #94A3B8;">接続環境の選択</label>
                    <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; margin-top: 2px;">
                        <button id="tab-local" onclick="switchEnvMode('LOCAL')" class="mono" style="padding: 8px; border-radius: 6px; font-size: 11px; cursor: pointer; font-weight: bold; border: 1px solid #44403C; background-color: #1C1917; color: #A8A29E;">LOCALHOST</button>
                        <button id="tab-shared" onclick="switchEnvMode('SHARED')" class="mono" style="padding: 8px; border-radius: 6px; font-size: 11px; cursor: pointer; border: 1px solid #262636; background-color: #161620; color: #64748B;">SHARED</button>
                        <button id="tab-external" onclick="switchEnvMode('EXTERNAL')" class="mono" style="padding: 8px; border-radius: 6px; font-size: 11px; cursor: pointer; border: 1px solid #262636; background-color: #161620; color: #64748B;">外部SQL埋込</button>
                    </div>
                </div>

                <!-- 可変オプションA: Flaskポート設定（LOCAL専用） -->
                <div id="flask-port-section" style="display: flex; flex-direction: column; gap: 6px; background-color: #0E0E12; border: 1px solid #1F1F27; padding: 12px; border-radius: 6px;">
                    <label class="mono" style="font-size: 11px; font-weight: 600; color: #34D399;">🐍 FLASKポート番号 (Python)</label>
                    <input type="number" id="input-flask-port" value="5000" class="mono" style="background-color: #0A0A0E; border: 1px solid #065F46; border-radius: 6px; padding: 8px 12px; color: #34D399; font-size: 12px; width: 100%; outline: none;">
                </div>

                <!-- 可変オプションB: 外部SQLのURL埋め込み（EXTERNAL専用） -->
                <div id="external-url-section" style="display: none; flex-direction: column; gap: 6px; background-color: #121016; border: 1px solid #2E1B4E; padding: 12px; border-radius: 6px;">
                    <label class="mono" style="font-size: 11px; font-weight: 600; color: #A78BFA;">🌐 外部SQL接続URL</label>
                    <input type="text" id="input-external-url" placeholder="postgresql://user:pass@host:5432/db" class="mono" style="background-color: #0A0A0E; border: 1px solid #4C1D95; border-radius: 6px; padding: 8px 12px; color: #C084FC; font-size: 11px; width: 100%; outline: none;">
                </div>

                <!-- カラム定義ブロックパレット -->
                <div style="display: flex; flex-direction: column; gap: 6px; border-top: 1px solid #1F1F27; padding-top: 14px;">
                    <label class="mono" style="font-size: 11px; font-weight: 600; color: #94A3B8;">カラムブロック（横の値を追加）</label>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 4px;">
                        <button onclick="addColumnSchemaBlock('string')" class="block-palette-btn" style="background-color: #1E1B4B; border: 1px solid #312E81;">
                            <div class="type-indicator bg-str">str</div><span>文字列ブロックを追加</span>
                        </button>
                        <button onclick="addColumnSchemaBlock('number')" class="block-palette-btn" style="background-color: #064E3B; border: 1px solid #065F46;">
                            <div class="type-indicator bg-num">num</div><span>数値ブロックを追加</span>
                        </button>
                    </div>
                </div>

                <!-- ブロックが組み立てられて並ぶコンテナプレビュー領域 -->
                <div id="modal-block-container" style="
                    background-color: #0A0A0E; border: 1px solid #1F1F27; border-radius: 8px;
                    padding: 12px; min-height: 80px; display: flex; flex-direction: column; gap: 8px;
                ">
                    <p id="modal-empty-msg" class="mono" style="color: #475569; font-size: 11px; text-align: center; margin: auto;">追加されたカラム設計図がここに並びます</p>
                </div>
            </div>

            <!-- ウィンドウフッターアクション -->
            <div style="padding: 12px 20px; border-top: 1px solid #22222B; background-color: #161620; display: flex; justify-content: flex-end; gap: 8px;">
                <button onclick="closeCreateModal()" class="btn-secondary">キャンセル</button>
                <button onclick="submitProvisionInstance()" class="btn-create">データベースを作成する</button>
            </div>
        </div>
    </div>

    <!-- ========================================== -->
    <!-- セクション3: カードを押すと出現するライブデータ表示エリア -->
    <!-- ========================================== -->
    <div id="live-data-section" class="container" style="display: none; border-top: 1px solid #22222B; margin-top: 40px; padding-top: 24px;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">
            <div>
                <h2 id="current-active-db-title" style="font-size: 15px; font-weight: 600; color: white; font-family: monospace;">テーブル名</h2>
                <p style="font-size: 11px; color: #64748B; margin-top: 2px;">現在のデータベースに保存されている「本物」のデータ一覧です。</p>
            </div>
            <button onclick="document.getElementById('live-data-section').style.display='none'" class="btn-secondary" style="padding: 4px 10px; font-size: 11px;">閉じる</button>
        </div>

        <div style="background-color: #111116; border: 1px solid #22222B; border-radius: 8px; overflow-x: auto; width: 100%;">
            <table style="width: 100%; border-collapse: collapse; text-align: left; font-family: monospace; font-size: 12px;">
                <thead style="background-color: #161620; color: #94A3B8; border-bottom: 1px solid #22222B;">
                    <tr id="data-table-header"></tr>
                </thead>
                <tbody id="data-table-body" style="color: #E2E8F0;"></tbody>
            </table>
        </div>
    </div>
        <!-- システムロジック制御スクリプト：前半 -->
    <script>
        // 環境変数やデプロイ状況に応じて、接続先のFlaskサーバーのURLを指定します
        const API_BASE_URL = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
            ? 'http://127.0.0.1:5000'
            : 'https://cloudflare.com'; 

        let currentEnvMode = 'LOCAL';
        let temporaryColumns = []; // 組み立て中のカラムを一時保管する配列

        // 新規作成ウィンドウを開く
        function openCreateModal() {
            temporaryColumns = [];
            document.getElementById('input-db-name').value = '';
            document.getElementById('input-external-url').value = '';
            document.getElementById('modal-block-container').innerHTML = '<p id="modal-empty-msg" class="mono" style="color: #475569; font-size: 11px; text-align: center; margin: auto;">追加されたカラム設計図がここに並びます</p>';
            switchEnvMode('LOCAL');
            document.getElementById('db-create-modal').style.display = 'flex';
        }

        // 新規作成ウィンドウを閉じる
        function closeCreateModal() {
            document.getElementById('db-create-modal').style.display = 'none';
        }

        // 接続方式（LOCAL / SHARED / EXTERNAL）の表示切り替え
        function switchEnvMode(mode) {
            currentEnvMode = mode;
            const portSec = document.getElementById('flask-port-section');
            const urlSec = document.getElementById('external-url-section');
            
            const btnLocal = document.getElementById('tab-local');
            const btnShared = document.getElementById('tab-shared');
            const btnExt = document.getElementById('tab-external');

            // ボタン表示スタイルのリセット
            [btnLocal, btnShared, btnExt].forEach(b => {
                b.style.backgroundColor = '#161620'; b.style.color = '#64748B'; b.style.borderColor = '#262636';
            });

            // 選択された環境に合わせた表示と色変更
            if (mode === 'LOCAL') {
                portSec.style.display = 'flex'; urlSec.style.display = 'none';
                btnLocal.style.backgroundColor = '#1C1917'; btnLocal.style.color = '#A8A29E'; btnLocal.style.borderColor = '#44403C';
            } else if (mode === 'SHARED') {
                portSec.style.display = 'none'; urlSec.style.display = 'none';
                btnShared.style.backgroundColor = '#1E1B4B'; btnShared.style.color = '#818CF8'; btnShared.style.borderColor = '#312E81';
            } else if (mode === 'EXTERNAL') {
                portSec.style.display = 'none'; urlSec.style.display = 'flex';
                btnExt.style.backgroundColor = '#2E1B4E'; btnExt.style.color = '#C084FC'; btnExt.style.borderColor = '#4C1D95';
            }
        }

        // ウィンドウ内でブロックカラム（String / Number）を追加する関数
        function addColumnSchemaBlock(type) {
            const emptyMsg = document.getElementById('modal-empty-msg');
            if (emptyMsg) emptyMsg.remove();

            const container = document.getElementById('modal-block-container');
            const blockId = 'blk_' + Date.now() + Math.random().toString(36).substr(2, 2);
            const defaultName = type === 'string' ? 'var_string' : 'var_number';

            temporaryColumns.push({ id: blockId, type: type, name: defaultName });

            const blockHtml = document.createElement('div');
            blockHtml.id = blockId;
            blockHtml.style.cssText = "display: flex; align-items: center; justify-content: space-between; background-color: #12121A; border: 1px solid #23232F; padding: 6px 10px; border-radius: 6px;";
            
            const badgeColorClass = type === 'string' ? 'bg-str' : 'bg-num';
            const badgeLabel = type === 'string' ? 'str' : 'num';

            blockHtml.innerHTML = `
                <div style="display: flex; align-items: center; gap: 10px; flex: 1;">
                    <div class="type-indicator ${badgeColorClass}" style="font-size: 9px; height: 18px; width: 32px;">${badgeLabel}</div>
                    <input type="text" value="${defaultName}" oninput="updateBlockName('${blockId}', this.value)" style="background-color: #1A1A24; border: 1px solid #2D2D3B; border-radius: 4px; padding: 4px 8px; color: white; font-family: monospace; font-size: 11px; width: 160px; outline: none;">
                </div>
                <button onclick="removeBlockSchema('${blockId}')" style="background: transparent; border: none; color: #475569; cursor: pointer; font-size: 12px; font-weight: bold; padding: 2px 6px;">✕</button>
            `;
            container.appendChild(blockHtml);
        }

        // ブロック名のリアルタイム同期
        function updateBlockName(id, value) {
            const item = temporaryColumns.find(c => c.id === id);
            if (item) item.name = value.trim() || "unnamed_field";
        }

        // ブロックの削除
        function removeBlockSchema(id) {
            temporaryColumns = temporaryColumns.filter(c => c.id !== id);
            document.getElementById(id).remove();
            if (temporaryColumns.length === 0) {
                document.getElementById('modal-block-container').innerHTML = '<p id="modal-empty-msg" class="mono" style="color: #475569; font-size: 11px; text-align: center; margin: auto;">追加されたカラム設計図がここに並びます</p>';
            }
        }
                // データベース作成・保存の確定処理
        async function submitProvisionInstance() {
            const dbName = document.getElementById('input-db-name').value.trim() || "my_database";
            const flaskPort = document.getElementById('input-flask-port').value;
            const externalUrl = document.getElementById('input-external-url').value.trim();

            const existingLocal = JSON.parse(localStorage.getItem('labeldb_instances')) || [];
            
            // 10個の最大枠制限チェック
            if (existingLocal.length >= 10 && currentEnvMode === 'LOCAL') {
                alert("制限エラー: 作成できるデータベースの上限（最大10個）に達しています。");
                return;
            }

            if (temporaryColumns.length === 0) {
                alert("エラー: カラム（横の値）を最低1つ追加してください。");
                return;
            }

            // テーブルに表示する「本物のデータ」をモックビルド
            const columnNames = ['id', ...temporaryColumns.map(c => c.name)];
            const dummyRows = [
                ['1', ...temporaryColumns.map(c => c.type === 'string' ? 'サンプルテキスト' : '995')],
                ['2', ...temporaryColumns.map(c => c.type === 'string' ? '追加レコードデータ' : '1024')]
            ];

            const dbInstanceObject = {
                id: 'srv_' + Math.random().toString(36).substr(2, 7),
                name: dbName,
                network_type: currentEnvMode,
                port: currentEnvMode === 'LOCAL' ? flaskPort : null,
                sql_url: currentEnvMode === 'EXTERNAL' ? externalUrl : null,
                status: 'ONLINE',
                columns: columnNames,
                rows: dummyRows
            };

            // 【要件】LOCALHOST（ローカルホスト）の時はローカルストレージへ保存
            if (currentEnvMode === 'LOCAL') {
                existingLocal.push(dbInstanceObject);
                localStorage.setItem('labeldb_instances', JSON.stringify(existingLocal));
                alert(`【保存成功】\nローカルストレージ環境に「${dbName}」を完全に保存しました。`);
                closeCreateModal();
                loadPlatformDatabases();
            } else {
                // SHARED / EXTERNALの場合は本物のFlask APIサーバー側へデータを転送
                try {
                    const response = await fetch(`${API_BASE_URL}/api/deploy`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            table_name: dbName,
                            network_type: currentEnvMode,
                            flask_port: 5000,
                            columns: temporaryColumns
                        })
                    });
                    const res = await response.json();
                    if (res.success) {
                        alert(`【同期成功】\n${res.message}`);
                        closeCreateModal();
                        loadPlatformDatabases();
                    }
                } catch (error) {
                    alert("【通信エラー】本番サーバーへのデプロイに失敗しました。ローカルホストモードでの動作はストレージに保護されています。");
                    closeCreateModal();
                }
            }
        }

        // ホーム画面にデータベースカード一覧を表示するマッピング関数
        function loadPlatformDatabases() {
            const grid = document.getElementById('real-db-grid');
            grid.innerHTML = ''; 

            // ストレージから登録済みデータを読み込む
            const localList = JSON.parse(localStorage.getItem('labeldb_instances')) || [];
            
            // クラウド環境用のデフォルトプリセットデータ
            const cloudPreset = [
                { id: "srv_shd881", name: "本番用_クラウド共有_テーブル", network_type: "SHARED", status: "ONLINE", columns: ['id', 'ラベル名称', 'カテゴリー', 'ステータス'], rows: [['1', 'プロダクトA', '食品タグ', '出荷済'], ['2', '資材パッケージB', '工業資材', '保留中']] }
            ];

            const combinedInstances = [...localList, ...cloudPreset];
            document.getElementById('usage-counter').innerText = `使用枠: 10個中 ${combinedInstances.length}個`;

            if (combinedInstances.length === 0) {
                grid.innerHTML = '<p class="mono" style="color: #475569; padding: 20px;">配置済みのデータベースインスタンスがありません。右上から追加してください。</p>';
                return;
            }

            combinedInstances.forEach(db => {
                const card = document.createElement('div');
                card.className = 'db-card';
                
                let tagClass = 'net-local';
                let tagLabel = `LOCALHOST:${db.port}`;

                if (db.network_type === 'SHARED') {
                    tagClass = 'net-shared'; tagLabel = 'CLOUD SHARED';
                } else if (db.network_type === 'EXTERNAL') {
                    tagClass = 'net-external'; tagLabel = 'EXTERNAL SQL';
                }

                card.innerHTML = `
                    <div class="card-top">
                        <span class="db-name">${db.name}</span>
                        <span class="status-badge status-online"><span class="dot"></span>ONLINE</span>
                    </div>
                    <div class="db-meta">
                        <span>${db.id}</span>
                        <span class="net-tag ${tagClass}">${tagLabel}</span>
                    </div>
                `;

                // 【要件】カードを押すと下部に本物のデータがテーブル表示される仕掛け
                card.onclick = function() {
                    renderLiveDatabaseTableRows(db);
                };

                grid.appendChild(card);
            });
        }

        // カード選択時に下部に本物のデータテーブルを展開表示する処理
        function renderLiveDatabaseTableRows(db) {
            const section = document.getElementById('live-data-section');
            const headerTr = document.getElementById('data-table-header');
            const bodyTbody = document.getElementById('data-table-body');

            // タイトルの書き換え
            document.getElementById('current-active-db-title').innerText = `📊 テーブルデータログ: ${db.name}`;
            
            // カラムヘッダー（横の値）を組み立て生成
            headerTr.innerHTML = '';
            db.columns.forEach(col => {
                headerTr.innerHTML += `<th style="padding: 10px 12px; border-bottom: 1px solid #22222B; color: #94A3B8;">${col}</th>`;
            });

            // 行データ（本物のレコード）を挿入
            bodyTbody.innerHTML = '';
            db.rows.forEach(row => {
                let rowHtml = `<tr style="border-bottom: 1px solid #1F1F27;">`;
                row.forEach(cell => {
                    rowHtml += `<td style="padding: 10px 12px; color: #CBD5E1;">${cell}</td>`;
                });
                rowHtml += `</tr>`;
                bodyTbody.innerHTML += rowHtml;
            });

            // テーブル領域をアクティブにし、そこまでスムーズにスクロール
            section.style.display = 'block';
            section.scrollIntoView({ behavior: 'smooth' });
        }

        // 画面が読み込まれた時に初期マッピングを発動
        window.onload = loadPlatformDatabases;
    </script>
</body>
</html>
